# grevy-lab – Zcash Feature Chain Lab
# Docker Compose orchestration for testing ZSA and Crosslink feature chains
# with Prometheus + Grafana monitoring.

services:

  # ──────────────────────────────────────────────────────────
  # ZSA Feature Chain Node
  # Runs Zebra on Testnet to exercise Zcash Shielded Assets (ZIP 226/227).
  # ──────────────────────────────────────────────────────────
  zsa-node:
    image: ${ZSA_NODE_IMAGE:-zfnd/zebra:latest}
    container_name: zsa-node
    pull_policy: always
    volumes:
      - zsa-node-data:/home/zebra/.cache/zebra
      - ./nodes/zsa-node/zebrad.toml:/home/zebra/.config/zebrad.toml:ro
    ports:
      - "127.0.0.1:${ZSA_P2P_PORT:-18233}:18233"     # Testnet P2P
      - "127.0.0.1:${ZSA_RPC_PORT:-18232}:18232"     # Testnet RPC
      - "127.0.0.1:${ZSA_METRICS_PORT:-9999}:9999"   # Prometheus metrics
    networks:
      - zcash-lab
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9999/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ──────────────────────────────────────────────────────────
  # Crosslink Protocol Node
  # Runs the experimental Crosslink hybrid PoW/PoS consensus.
  # Override CROSSLINK_NODE_IMAGE with shieldedlabs/zebra-crosslink:latest
  # for the Crosslink-specific build once it is published.
  # ──────────────────────────────────────────────────────────
  crosslink-node:
    image: ${CROSSLINK_NODE_IMAGE:-zfnd/zebra:latest}
    container_name: crosslink-node
    pull_policy: always
    volumes:
      - crosslink-node-data:/home/zebra/.cache/zebra
      - ./nodes/crosslink-node/zebrad.toml:/home/zebra/.config/zebrad.toml:ro
    ports:
      - "127.0.0.1:${CROSSLINK_P2P_PORT:-18243}:18233"     # Testnet P2P (remapped)
      - "127.0.0.1:${CROSSLINK_RPC_PORT:-18242}:18232"     # Testnet RPC (remapped)
      - "127.0.0.1:${CROSSLINK_METRICS_PORT:-9998}:9999"   # Prometheus metrics (remapped)
    networks:
      - zcash-lab
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9999/metrics > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ──────────────────────────────────────────────────────────
  # ZSA Transaction Tool
  # QEDIT's tool for generating and submitting V5/V6 ZSA transactions.
  # ──────────────────────────────────────────────────────────
  zsa-tx-tool:
    image: ${ZSA_TX_TOOL_IMAGE:-public.ecr.aws/j7v0v6n9/tx-tool:latest}
    container_name: zsa-tx-tool
    pull_policy: always
    environment:
      ZCASH_NODE_ADDRESS: zsa-node
      ZCASH_NODE_PORT: "18232"
      ZCASH_NODE_PROTOCOL: http
    networks:
      - zcash-lab
    depends_on:
      zsa-node:
        condition: service_healthy
    profiles:
      - zsa-tx
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # ZSA Assets Dashboard
  # React SPA served by nginx with API proxying to Prometheus
  # and both Zcash nodes for live metric and RPC queries.
  # ──────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: grevy-lab/dashboard:latest
    container_name: dashboard
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8080}:8080"
    networks:
      - zcash-lab
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # Prometheus – metrics collection
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.51.2}
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - zcash-lab
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # Grafana – visualisation
  # ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.4.2}
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3000}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    # Bind to localhost by default. To intentionally expose to the local network,
    # set GRAFANA_HOST=0.0.0.0 in .env and change the port binding below.
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    networks:
      - zcash-lab
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ──────────────────────────────────────────────────────────
  # Node Exporter – host-level system metrics
  # ──────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.7.0}
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "127.0.0.1:${NODE_EXPORTER_PORT:-9100}:9100"
    networks:
      - zcash-lab
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  zcash-lab:
    driver: bridge
    name: zcash-lab

volumes:
  zsa-node-data:
    name: grevy-lab_zsa-node-data
  crosslink-node-data:
    name: grevy-lab_crosslink-node-data
  prometheus-data:
    name: grevy-lab_prometheus-data
  grafana-data:
    name: grevy-lab_grafana-data
