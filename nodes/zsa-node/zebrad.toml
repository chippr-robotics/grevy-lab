# ZSA Feature Chain Node – zebrad.toml
# This node connects to Testnet to exercise Zcash Shielded Assets (ZSA).
# ZSA is implemented via ZIP 226 (Asset Issuance) and ZIP 227 (Burn Mechanism).
#
# Switch `network` to "Mainnet" and update ports when ZSA activates on mainnet.

[network]
network = "Testnet"
listen_addr = "0.0.0.0:18233"
# Allow some time between peer discovery crawls to reduce noise on testnet.
crawl_new_peer_interval = "1m 1s"

[state]
# Docker volume mount point for persistent chain state.
cache_dir = "/home/zebra/.cache/zebra"

[metrics]
# Expose Prometheus-compatible /metrics endpoint for scraping.
endpoint_addr = "0.0.0.0:9999"

[tracing]
# Structured log filtering; increase to "debug" for deep inspection.
filter = "info"
# Use 3001 to avoid colliding with the Grafana container on port 3000.
endpoint_addr = "0.0.0.0:3001"

[rpc]
listen_addr = "0.0.0.0:18232"
# Disable cookie auth so the ZSA tx-tool can reach the RPC without credentials.
enable_cookie_auth = false
# Run parallel CPU threads for block verification (0 = auto).
parallel_cpu_threads = 0
