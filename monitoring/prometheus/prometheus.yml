global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    lab: grevy-lab

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ZSA Feature Chain Node
  - job_name: "zsa-node"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["zsa-node:9999"]
        labels:
          node: "zsa-node"
          chain: "zsa"
          network: "testnet"

  # Crosslink Protocol Node
  - job_name: "crosslink-node"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["crosslink-node:9999"]
        labels:
          node: "crosslink-node"
          chain: "crosslink"
          network: "testnet"

  # Host-level system metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
