name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Lint & static validation
  #    Fast checks that require no Docker daemon: YAML, JSON, TOML, shell.
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── YAML ──────────────────────────────────────────────────────────────
      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint YAML files
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 120}, truthy: disable}}' \
            docker-compose.yml \
            monitoring/prometheus/prometheus.yml \
            monitoring/grafana/provisioning/datasources/prometheus.yml \
            monitoring/grafana/provisioning/dashboards/dashboards.yml

      # ── JSON ──────────────────────────────────────────────────────────────
      - name: Validate Grafana dashboard JSON
        run: python3 -c "import json, sys; json.load(open('monitoring/grafana/dashboards/zcash-overview.json')); print('Dashboard JSON OK')"

      # ── TOML ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11 (for tomllib stdlib)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate zebrad TOML configs
        run: |
          python3 - <<'EOF'
          import tomllib, glob, sys
          configs = glob.glob('nodes/**/*.toml', recursive=True)
          if not configs:
              print('No TOML files found', file=sys.stderr)
              sys.exit(1)
          for path in configs:
              with open(path, 'rb') as f:
                  tomllib.load(f)
              print(f'OK: {path}')
          EOF

      # ── Shell scripts ──────────────────────────────────────────────────────
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"
          severity: warning

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Docker Compose validation
  #    Verifies the compose spec is well-formed without starting containers.
  # ──────────────────────────────────────────────────────────────────────────
  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config (no warnings)
        run: |
          cp .env.example .env
          docker compose config --quiet
          echo "docker compose config: OK"

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Monitoring stack integration test
  #    Starts Prometheus, Grafana, and node-exporter (the lightweight subset
  #    that does not require Zebra images) and confirms health endpoints.
  #    The Zcash nodes are intentionally excluded here — they would need to
  #    sync the chain which is impractical in CI.
  # ──────────────────────────────────────────────────────────────────────────
  monitoring-integration:
    name: Monitoring stack integration test
    runs-on: ubuntu-latest
    needs: [lint, compose-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Start monitoring services
        run: |
          cp .env.example .env
          docker compose up -d prometheus grafana node-exporter
          echo "Waiting for services to pass health checks …"

      - name: Wait for Prometheus to be healthy
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:9090/-/healthy; then
              echo "Prometheus healthy"
              break
            fi
            echo "Attempt $i/24 – waiting 5 s …"
            sleep 5
          done
          curl -sf http://localhost:9090/-/healthy || { echo "Prometheus did not become healthy"; exit 1; }

      - name: Wait for Grafana to be healthy
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Grafana healthy"
              break
            fi
            echo "Attempt $i/24 – waiting 5 s …"
            sleep 5
          done
          curl -sf http://localhost:3000/api/health || { echo "Grafana did not become healthy"; exit 1; }

      - name: Wait for node-exporter to expose metrics
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:9100/metrics > /dev/null; then
              echo "node-exporter metrics OK"
              break
            fi
            echo "Attempt $i/12 – waiting 5 s …"
            sleep 5
          done
          curl -sf http://localhost:9100/metrics > /dev/null || { echo "node-exporter did not expose metrics"; exit 1; }

      - name: Verify Prometheus scrape targets
        run: |
          TARGETS=$(curl -sf http://localhost:9090/api/v1/targets | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['data']['activeTargets']))")
          echo "Active Prometheus scrape targets: $TARGETS"
          # At minimum Prometheus self-monitoring + node-exporter should be active.
          # ZSA and Crosslink nodes are intentionally not started in CI.
          [ "$TARGETS" -ge 2 ] || { echo "Expected at least 2 scrape targets"; exit 1; }

      - name: Verify Grafana datasource provisioning
        run: |
          STATUS=$(curl -sf -u admin:grafana http://localhost:3000/api/datasources | python3 -c "import sys,json; ds=json.load(sys.stdin); print(len(ds))")
          echo "Grafana datasources provisioned: $STATUS"
          [ "$STATUS" -ge 1 ] || { echo "No datasources provisioned in Grafana"; exit 1; }

      - name: Verify Grafana dashboard provisioning
        run: |
          COUNT=$(curl -sf -u admin:grafana 'http://localhost:3000/api/search?type=dash-db' | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Grafana dashboards available: $COUNT"
          [ "$COUNT" -ge 1 ] || { echo "No dashboards found in Grafana"; exit 1; }

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
